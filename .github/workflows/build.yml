name: Build R2Drop

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:  # 手动触发

jobs:
  build-mac:
    name: Build macOS .app
    runs-on: macos-15  # macOS 15 Sequoia, Xcode 16

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Build (debug)
        run: swift build

      - name: Build (release)
        run: swift build -c release --arch arm64 --arch x86_64

      - name: Package .app bundle
        run: |
          APP_PATH=".build/apple/Products/Release/R2Drop"
          if [ -d "$APP_PATH" ]; then
            # Sign with ad-hoc for distribution
            codesign --force --deep --sign - "$APP_PATH"
            # Create a DMG
            hdiutil create -volname "R2Drop" -srcfolder "$APP_PATH" \
              -ov -format UDZO "R2Drop-macOS.dmg"
          else
            echo "App bundle not found at $APP_PATH"
            ls -la .build/apple/Products/Release/ || true
            exit 1
          fi

      - name: Upload DMG as artifact
        uses: actions/upload-artifact@v4
        with:
          name: R2Drop-macOS
          path: R2Drop-macOS.dmg

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-mac
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: R2Drop-macOS

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: R2Drop-macOS.dmg
          draft: true
          generate_release_notes: true
