name: Build R2Drop

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch:

jobs:
  build:
    name: Build macOS .app
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Build
      run: swift build -c release
      
    - name: Package DMG
      run: |
        APP=R2Drop
        BIN=.build/release/$APP
        test -f "$BIN" || exit 1
        mkdir -p "$APP.app/Contents/MacOS"
        cp "$BIN" "$APP.app/Contents/MacOS/$APP"
        cat > "$APP.app/Contents/Info.plist" <<EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>$APP</string>
            <key>CFBundleIdentifier</key>
            <string>app.r2drop</string>
            <key>CFBundleName</key>
            <string>R2Drop</string>
            <key>CFBundleVersion</key>
            <string>0.1.0</string>
            <key>CFBundleShortVersionString</key>
            <string>0.1.0</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>14.0</string>
        </dict>
        </plist>
        EOF
        codesign --force --deep --sign - "$APP.app"
        hdiutil create -volname "$APP" -srcfolder "$APP.app" -ov -format UDZO "$APP-macOS.dmg"
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: R2Drop-macOS
        path: R2Drop-macOS.dmg
